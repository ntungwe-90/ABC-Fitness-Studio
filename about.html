<!doctype html>
<html>
  <head>
    <title>About Us - ABC Fitness Studio</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <img
        src="images/logo.png"
        alt="ABC Fitness Studio Logo"
        width="50px"
        height="50px"
      />
      <nav>
        <a href="index.html">Home</a> | <a href="gallery.html">Gallery</a> |
        <a href="about.html">About Us</a> |
        <a href="custom.html">Community</a>
      </nav>
    </header>

    <section>
      <div class="container">
        <h2 class="section-title">About Our Studio</h2>
        <p>
          ABC Fitness Studio provides professional fitness training, modern
          equipment, and certified instructors.
        </p>
        <h3>Business Hours</h3>

        <table border="1">
          <tr>
            <th>Day</th>
            <th>Opening Hours</th>
          </tr>
          <tr>
            <td>Monday - Friday</td>
            <td>6am - 9pm</td>
          </tr>
          <tr>
            <td>Saturday</td>
            <td>8am - 6pm</td>
          </tr>
          <tr>
            <td>Sunday</td>
            <td>Closed</td>
          </tr>
        </table>

        <h3>Feedback Form</h3>
        <form>
          <input type="text" placeholder="Your Name" required />

          <input type="email" placeholder="Your Email" required />

          <textarea rows="5" placeholder="Your Message" required></textarea>

          <button type="submit" onclick="submitMessage()">Submit</button>
        </form>
      </div>
    </section>

    <footer>
      <p>© 2026 ABC Fitness Studio</p>
    </footer>
    <script src="script.js"></script>
  </body>
</html>
